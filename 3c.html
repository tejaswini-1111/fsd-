<!DOCTYPE html>
<html>
<head>
    <title>Learning CSS Levels</title>

    <link rel="stylesheet" href="style.css">

    <style>
        body {
            background-color: lightyellow;
        }

       
        highlight {
            border: 2px solid orange;
            padding: 10px;
        }
    </style>
</head>
<body>

    <h1>Welcome to My Styled Page</h1>
    <p>This paragraph is styled by the External CSS file.</p>

    <div class="highlight">
        <p>This box is styled by Internal CSS in the head section.</p>
    </div>

    <p style="color: red; font-weight: bold;">
        This text is styled using Inline CSS. It is red because inline styles win!
    </p>

</body> 

</html>
