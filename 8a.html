<!DOCTYPE html>
<html lang="en">
<head>
    <title>Number Comparison</title>
</head>
<body>

    <script>
        // 1. Obtain three integers from the user
        const num1 = parseInt(prompt("Enter the first integer:"));
        const num2 = parseInt(prompt("Enter the second integer:"));
        const num3 = parseInt(prompt("Enter the third integer:"));

        let message = "";

        // 2. Check if all numbers are equal
        if (num1 === num2 && num2 === num3) {
            message = "EQUAL NUMBERS";
        } else {
            // 3. Find the largest number
            const larger = Math.max(num1, num2, num3);
            message = larger + " LARGER NUMBER";
        }

        // 4. Output the result as an information message dialog (alert)
        alert(message);

        // 5. Output HTML text to the page
        document.write("<h1>Comparison Result:</h1>");
        document.write("<p>" + message + "</p>");
    </script>

</body>
</html>
