<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Demon Slayer Corps HQ</title>
    <style>
        body {
            margin: 0;
            font-family: 'Georgia', serif; /* More traditional feel */
            text-align: center;
            /* Dark, charcoal background with a hint of deep red */
            background: radial-gradient(circle, #2b0000 0%, #000000 100%);
            color: #f1f1f1;
            line-height: 1.6;
        }

        header {
            padding: 50px;
            font-size: 48px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #e63946;
            text-shadow: 3px 3px 5px black;
            border-bottom: 4px solid #e63946;
        }

        nav {
            background-color: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-bottom: 1px solid #444;
        }

        nav a {
            color: #ffffff;
            text-decoration: none;
            margin: 0 20px;
            font-weight: bold;
            text-transform: uppercase;
        }

        nav a:hover {
            color: #e63946;
        }

        .content {
            padding: 40px;
        }

        h2 {
            font-size: 32px;
            margin-bottom: 30px;
            color: #d4af37; /* Gold accent */
        }

        .member-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
        }

        .member-card {
            background-color: #1a1a1a;
            padding: 15px;
            border: 2px solid #333;
            border-radius: 10px;
            width: 220px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .member-card:hover {
            transform: translateY(-10px);
            border-color: #e63946;
            box-shadow: 0 0 15px #e63946;
        }

        .member-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 5px;
            margin-bottom: 15px;
            background-color: #333; /* Placeholder color */
        }

        .member-name {
            font-size: 20px;
            font-weight: bold;
            color: #e63946;
            display: block;
        }

        .role {
            font-style: italic;
            font-size: 14px;
            color: #bbb;
        }

        footer {
            background-color: #000;
            padding: 30px;
            margin-top: 50px;
            border-top: 2px solid #e63946;
            font-size: 14px;
        }
    </style>
</head>
