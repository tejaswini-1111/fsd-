 <!DOCTYPE html>
<html>
<head>
    <title>HTML Tables</title>
</head>
<body>

<h2>Student Internal Marks Table</h2>

<table border="1" cellpadding="10" cellspacing="2">
    
    <!-- Table Heading Row -->
    <tr>
        <th rowspan="2">Roll No</th>
        <th rowspan="2">Name</th>
        <th colspan="3">Marks</th>
    </tr>

    <!-- Sub headings -->
    <tr>
        <th>python</th>
        <th>adsa</th>
        <th>java</th>
    </tr>

    <!-- Table Data Rows -->
    <tr>
        <td>1</td>
        <td>A</td>
        <td>25</td>
        <td>26</td>
        <td>20</td>
    </tr>

    <tr>
        <td>2</td>
        <td>B</td>
        <td>10</td>
        <td>15</td>
        <td>25</td>
    </tr>

    <tr>
        <td>3</td>
        <td>C</td>
        <td>22</td>
        <td>28</td>
        <td>25</td>
    </tr>

</table>
</body>
</html>
