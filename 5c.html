<!DOCTYPE html>
<html>
<head>
    <style>
        .mission-box {
            background-color: #0f0f0f;
            color: #e63946;
            width: 400px;
            padding: 20px;
            border: 3px double #d4af37;
            margin: 50px auto;
            
            /* vi. Text-alignment: Centers all text inside the box */
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
        }

        .heading {
            /* i. font-size: Makes the title large */
            font-size: 36px;
            /* ii. font-weight: Makes the title very thick */
            font-weight: bold;
            /* v. text-transformation: Forces "top secret" to be "TOP SECRET" */
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .sub-heading {
            /* iv. text-decoration: Adds a line under the location */
            text-decoration: underline;
            /* v. text-transformation: Capitalizes every first letter */
            text-transform: capitalize;
            display: block;
            color: #ffffff;
        }

        .status {
            /* iii. font-style: Makes the status italicized */
            font-style: italic;
            font-size: 14px;
            color: #888;
            margin-top: 15px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="mission-box">
        <div class="heading">Top Secret</div>
        <span class="sub-heading">location: mugen train</span>
        <p>Eliminate the demon threat and protect the 200 passengers on board. Do not let the fire go out.</p>
        <span class="status">Status: Active Mission</span>
    </div>

</body>
</html>
