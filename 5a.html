<!DOCTYPE html>
<head>
<style>
	.color1{
        	color: blue;
	}
	.color2{
        	background-color: rgb( 10, 69 , 94);
	}
	.color3{
        	color: rgb(94, 69, 10);
	}
	.color4{
        	color: #09f0ff;
	}
	.color5{
        	color: rgba(94, 10, 18, 0.3);
	}
	.color6{
        	color: hsl(69, 201 , 33);
	}

        	color: hsla(1, 22, 4, 0.7);
	}

</style>
</head>
<body>
<h3 class="color1">color-name</h3>
<h3 class="color2">background-color</h3>
<h3 class="color3">RGB color with values</h3>
<h3 class="color4">HEX color with value</h3>
<h3 class="color5">RGBA with values</h3>
<h3 class="color6">HSL with values</h3>
<h3 class="color7">HSLA with values</h3>

</html>
