<!DOCTYPE html>
<html>
<head>
<style>
  /* 1. Universal: Everyone gets a margin */
  * { margin: 5px; }

  /* 2. Element: All buttons are blue */
  button { color: blue; }

  /* 3. ID: The one and only 'header' is centered */
  #header { text-align: center; }

  /* 4. Class: Anything 'important' is red */
  .important { color: red; }

  /* 5. Child: Only the <i> directly inside a <p> turns green */
  p > i { color: green; }

  /* 6. Pseudo-class: Change color when mouse touches it */
  button:hover { background-color: yellow; }

  /* 7. Attribute: Only inputs for numbers get a thick border */
  input[type="number"] { border: 3px solid black; }
</style>
</head>
<body>

  <h1 id="header">My Simple Page</h1>

  <p class="important">This is a very important paragraph!</p>

  <p>This is a <i>green italic</i> word.</p>

  <div>
     <i>This italic is NOT green because it's not in a paragraph.</i>
  </div>

  <button>Hover Me!</button>

  <br><br>
  Enter a number: <input type="number">

</body>
</html>
