<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Math Toolkit</title>
</head>
<body>

    <div class="container">
        <h2>Mathematical Toolkit</h2>
        <input type="number" id="numInput" placeholder="Enter a number">
        <br>
        <button onclick="calculateFactorial()">Factorial</button>
        <button onclick="calculateFibonacci()">Fibonacci</button>
        <button onclick="calculatePrime()">Prime</button>
        <button onclick="checkPalindrome()">Palindrome</button>

        <div id="output"></div>
    </div>

    <script>
        function getVal() {
            return parseInt(document.getElementById("numInput").value);
        }

        function setDisplay(msg) {
            document.getElementById("output").innerText = msg;
        }

        // i. Factorial: n * (n-1) * (n-2)...
        function calculateFactorial() {
            let n = getVal();
            if (isNaN(n) || n < 0) return setDisplay("Please enter a valid positive number.");
            let fact = 1;
            for (let i = 1; i <= n; i++) fact *= i;
            setDisplay("Factorial: " + fact);
        }

        // ii. Fibonacci: Sum of two preceding numbers
        function calculateFibonacci() {
            let n = getVal();
            if (isNaN(n) || n < 0) return setDisplay("Please enter a valid positive number.");
            let a = 0, b = 1, next = 0;
            let series = [0];
            while (b <= n) {
                series.push(b);
                next = a + b;
                a = b;
                b = next;
            }
            setDisplay("Fibonacci Series: " + series.join(", "));
        }

        // iii. Prime: Only divisible by 1 and itself
        function calculatePrime() {
            let n = getVal();
            if (isNaN(n)) return setDisplay("Please enter a number.");
            let primes = [];
            for (let i = 2; i <= n; i++) {
                let isPrime = true;
                for (let j = 2; j <= Math.sqrt(i); j++) {
                    if (i % j === 0) { isPrime = false; break; }
                }
                if (isPrime) primes.push(i);
            }
            setDisplay("Primes up to " + n + ": " + primes.join(", "));
        }

        // iv. Palindrome: Same forwards and backwards
        function checkPalindrome() {
            let original = document.getElementById("numInput").value;
            if (original === "") return setDisplay("Please enter a number.");
            let reversed = original.split('').reverse().join('');
            if (original === reversed) {
                setDisplay(original + " is a Palindrome! ✅");
            } else {
                setDisplay(original + " is not a Palindrome. ❌");
            }
        }
    </script>

</body>
</html>
